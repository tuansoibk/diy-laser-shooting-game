<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shooting Game</title>
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>

<!-- ── Setup screen ──────────────────────────────────────────── -->
<div id="setup" class="screen">
  <div class="setup-card">
    <h1>Shooting Game</h1>
    <div class="field">
      <label>Backend URL</label>
      <input id="s-backend" type="url" placeholder="http://192.168.1.x:8000">
    </div>
    <button id="s-connect">Connect</button>
    <p id="s-error" class="error hidden"></p>
  </div>
</div>

<!-- ── Main screen ───────────────────────────────────────────── -->
<div id="main" class="screen hidden">
  <header class="topbar">
    <div class="topbar-row1">
      <div class="topbar-info">
        <span id="m-player" class="player-name"></span>
        <span id="m-subtitle" class="subtitle"></span>
        <span id="m-round-badge" class="round-badge hidden"></span>
      </div>
      <div class="topbar-meta">
        <span id="m-status" class="status-dot" title="Polling"></span>
        <button id="m-change" class="btn-ghost">Server</button>
      </div>
    </div>
    <div class="topbar-row2">
      <div class="topbar-controls">
        <input id="c-player" type="text" placeholder="Player" value="Player" class="topbar-input">
        <button id="c-new-game" class="btn-action btn-green">New Game</button>
        <div class="topbar-sep"></div>
        <button id="c-new-round" class="btn-action btn-blue">New Round</button>
        <button id="c-end-round" class="btn-action btn-red">End Round</button>
      </div>
    </div>
  </header>

  <div class="content">
    <div class="canvas-wrap">
      <canvas id="canvas"></canvas>
    </div>

    <div class="side-panel">
      <div class="scorecard">
        <div class="stat-item">
          <div class="stat-val" id="m-total">—</div>
          <div class="stat-lbl">Total</div>
        </div>
        <div class="stat-item">
          <div class="stat-val" id="m-count">0</div>
          <div class="stat-lbl">Shots</div>
        </div>
        <div class="stat-item">
          <div class="stat-val" id="m-best">—</div>
          <div class="stat-lbl">Best</div>
        </div>
        <div class="stat-item">
          <div class="stat-val" id="m-avg">—</div>
          <div class="stat-lbl">Avg</div>
        </div>
      </div>

      <div class="section-label">Shots</div>
      <div id="shot-list" class="shot-list"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
